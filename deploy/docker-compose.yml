version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: short-url-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - short-url-network

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: short-url-app
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_DB=0
      - REDIS_POOL_SIZE=50
      - BASE_URL=http://localhost:8080
      - LOG_LEVEL=info
      - MIN_CODE_LENGTH=6
      - DEFAULT_TTL=0
      - MAX_URL_LENGTH=2048
      - SHUTDOWN_TIMEOUT=30
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - short-url-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  short-url-network:
    driver: bridge
